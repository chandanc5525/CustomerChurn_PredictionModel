name: Greetings

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  greeting:
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Welcome First-Time Contributors
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          issue-message: |
            Welcome to the repository!

            Thank you for raising your first issue. We truly appreciate your effort in helping improve this project.

            Our team will review your submission and get back to you shortly.  
            In the meantime, please ensure all relevant details have been provided to help us assist you efficiently.

          pr-message: |
            Thank you for your contribution!

            We sincerely appreciate your effort in submitting your first pull request.

            Our team will review your changes and provide feedback soon.  
            Kindly ensure that your code follows the project guidelines and includes necessary documentation where applicable.
